name: Keep multiplayer server warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="${{ secrets.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            URL="https://jj-multiplayer.onrender.com"
          fi
          curl -fsS --max-time 30 "$URL" || echo "Ping failed (server may be waking up)"
